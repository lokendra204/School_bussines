<!DOCTYPE html>
<html>
<head>
    <title>PROFILE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:white;
            text-align:center;
        }

        h2{
            margin-top:25px;
            letter-spacing:3px;
        }

        .container{
            margin-top:30px;
        }

        .circle{
            width:150px;
            height:150px;
            border-radius:50%;
            background:#1e293b;
            margin:20px auto;
            overflow:hidden;
            cursor:pointer;
            position:relative;
            border:3px solid white;
        }

        .circle img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .plus{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            font-size:60px;
            color:#94a3b8;
        }

        input[type="file"]{
            display:none;
        }

        .info-box{
            width:320px;
            margin:20px auto;
            background:#1e293b;
            padding:20px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.5);
            text-align:left;
        }

        .label{
            font-size:14px;
            color:#cbd5e1;
            margin-top:10px;
        }

        .edit{
            width:100%;
            padding:8px;
            margin-top:5px;
            border:none;
            border-radius:5px;
        }

        .btn{
            margin-top:15px;
            padding:10px;
            width:100%;
            background:#16a34a;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-weight:bold;
        }

        .msg{
            margin-top:10px;
            text-align:center;
            color:#4ade80;
            font-size:14px;
        }

        .back{
            margin:25px auto;
            padding:10px 15px;
            background:black;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h2>PROFILE</h2>

<div class="container">

    <div class="circle" onclick="chooseImage()">
        <span class="plus" id="plus">+</span>
        <img id="preview">
    </div>

    <input type="file" id="fileInput" accept="image/*" onchange="loadImage(event)">

    <div class="info-box">

        <div class="label">SCS NO:</div>
        <div id="scs"></div>

        <div class="label">USERNAME:</div>
        <input class="edit" id="username">

        <div class="label">DISPLAY NAME:</div>
        <input class="edit" id="display">

        <button class="btn" onclick="saveData()">SAVE CHANGES</button>
        <div class="msg" id="msg"></div>

    </div>

</div>

<button class="back" onclick="window.location.href='dashboard.html'">BACK TO DASHBOARD</button>

<script>
let user = localStorage.getItem("currentUser");

document.getElementById("scs").innerText = user;

function chooseImage(){
    document.getElementById("fileInput").click();
}

function loadImage(event){
    let img = document.getElementById("preview");
    img.src = URL.createObjectURL(event.target.files[0]);
    document.getElementById("plus").style.display="none";
    localStorage.setItem(user+"_pic", img.src);
}

window.onload = function(){
    let uname = localStorage.getItem(user+"_username") || user;
    let dname = localStorage.getItem(user+"_display") || uname;

    document.getElementById("username").value = uname;
    document.getElementById("display").value = dname;

    let pic = localStorage.getItem(user+"_pic");
    if(pic){
        document.getElementById("preview").src = pic;
        document.getElementById("plus").style.display="none";
    }
}

function saveData(){
    let uname = document.getElementById("username").value;
    let dname = document.getElementById("display").value;

    localStorage.setItem(user+"_username", uname);
    localStorage.setItem(user+"_display", dname);

    document.getElementById("msg").innerText = "PROFILE SAVED SUCCESSFULLY ✅";
}
</script>

</body>
</html>
