<!DOCTYPE html>
<html>
<head>
    <title>VOTE HOUSE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:white;
            text-align:center;
        }

        h2{
            margin-top:25px;
            letter-spacing:3px;
        }

        .grid{
            margin-top:40px;
            display:grid;
            grid-template-columns: repeat(2, 280px);
            gap:30px;
            justify-content:center;
        }

        .card{
            background:#1e293b;
            padding:30px 10px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.5);
            cursor:pointer;
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
            background:#334155;
        }

        .card h3{
            margin:10px 0;
            font-size:22px;
        }

        .msg{
            margin-top:25px;
            font-size:18px;
            color:#4ade80;
        }

        .back{
            margin:25px auto;
            padding:10px 15px;
            background:black;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        @media(max-width:650px){
            .grid{
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<h2>VOTE FOR YOUR HOUSE</h2>

<div class="grid">
    <div class="card" onclick="vote('KNIGHTS')">
        <h3>HOUSE A</h3>
        KNIGHTS
    </div>

    <div class="card" onclick="vote('SAMURAIS')">
        <h3>HOUSE B</h3>
        SAMURAIS
    </div>

    <div class="card" onclick="vote('SPARTANS')">
        <h3>HOUSE C</h3>
        SPARTANS
    </div>

    <div class="card" onclick="vote('VIKINGS')">
        <h3>HOUSE D</h3>
        VIKINGS
    </div>
</div>

<div class="msg" id="msg"></div>

<button class="back" onclick="window.location.href='dashboard.html'">BACK TO DASHBOARD</button>

<script>
let user = localStorage.getItem("currentUser");
let previousVote = localStorage.getItem(user + "_vote");

if(previousVote){
    document.getElementById("msg").innerText =
        "YOU ALREADY VOTED FOR: " + previousVote;
}

function vote(house){
    localStorage.setItem(user + "_vote", house);
    document.getElementById("msg").innerText =
        "VOTE SAVED FOR: " + house + " ✅";
}
</script>

</body>
</html>
