<!DOCTYPE html>
<html>
<head>
    <title>FRIEND LIST</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:white;
        }
        .top{
            padding:15px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
            background:#1e293b;
            position:relative;
        }
        .back{
            position:absolute;
            left:15px;
            top:15px;
            cursor:pointer;
            font-size:14px;
        }
        .container{ padding:20px; }
        .friend-box{
            background:#1e293b;
            padding:15px;
            border-radius:10px;
            margin-bottom:15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 6px 15px rgba(0,0,0,0.4);
        }
        .friend-info{ display:flex; flex-direction:column; }
        .name{ font-weight:bold; font-size:16px; }
        .scs{ font-size:13px; color:#cbd5e1; }
        .btns button{
            border:none;
            padding:8px 14px;
            border-radius:6px;
            color:white;
            cursor:pointer;
            font-weight:bold;
            margin-left:6px;
        }
        .remove{ background:#e53935; }
        .chat{ background:#22c55e; }
        .empty{
            text-align:center;
            margin-top:50px;
            color:#94a3b8;
        }
    </style>
</head>

<body>

<div class="top">
    <div class="back" onclick="goBack()">← BACK</div>
    YOUR FRIENDS
</div>

<div class="container" id="friendContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, query, where,
  doc, getDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_0wFUxxNk3Dc8s3jYuUq85kEwYqoFLGw",
  authDomain: "school-project-7beb3.firebaseapp.com",
  projectId: "school-project-7beb3",
  storageBucket: "school-project-7beb3.firebasestorage.app",
  messagingSenderId: "846563976783",
  appId: "1:846563976783:web:7dfdb561fa79b17cefec3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let me = localStorage.getItem("currentUser");
let container = document.getElementById("friendContainer");

async function loadFriends(){
    container.innerHTML = "";

    // ✅ Get all friends where me = current user
    const q = query(collection(db,"friends"), where("me","==",me));
    const snap = await getDocs(q);

    if(snap.empty){
        container.innerHTML = "<div class='empty'>NO FRIENDS ADDED</div>";
        return;
    }

    for(const d of snap.docs){
        let friend = d.data().friend;

        // ✅ Get friend username from users collection
        const userSnap = await getDoc(doc(db,"users",friend));
        let uname = userSnap.exists() ? userSnap.data().username : friend;

        let box = document.createElement("div");
        box.className = "friend-box";

        box.innerHTML = `
            <div class="friend-info">
                <div class="name">${uname}</div>
                <div class="scs">SCS: ${friend}</div>
            </div>
            <div class="btns">
                <button class="remove" onclick="removeFriend('${friend}')">REMOVE</button>
                <button class="chat" onclick="openChat('${friend}')">CHAT</button>
            </div>
        `;

        container.appendChild(box);
    }
}

window.removeFriend = async function(friend){
    await deleteDoc(doc(db,"friends", me+"_"+friend));
    loadFriends();
}

window.openChat = function(friendSCS){
    localStorage.setItem("chatFriend", friendSCS);
    window.location.href = "chat.html";
}

window.goBack = function(){
    window.location.href = "dashboard.html";
}

loadFriends();
</script>

</body>
</html>
