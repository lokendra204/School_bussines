<!DOCTYPE html>
<html>
<head>
<title>UPLOADED BY YOU</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#0f172a;color:white;font-family:Arial;text-align:center">

<h1>YOUR UPLOADED NOTES</h1>
<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_0wFUxxNk3Dc8s3jYuUq85kEwYqoFLGw",
  authDomain: "school-project-7beb3.firebaseapp.com",
  databaseURL: "https://school-project-7beb3-default-rtdb.firebaseio.com/",
  projectId: "school-project-7beb3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let scs = localStorage.getItem("currentUser");

db.ref("notes").on("value",snap=>{
    let html="";
    snap.forEach(d=>{
        let n=d.val();
        if(n.owner==scs){
            html+=`<div>
                ${n.title}
                <button onclick="del('${d.key}')">DELETE</button>
            </div>`;
        }
    });
    document.getElementById("list").innerHTML=html;
});

function del(k){
    db.ref("notes/"+k).remove();
}
</script>

</body>
</html>
