<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;text-align:center;background:#e9e9e9;margin:0}
.box{width:320px;margin:20px auto;background:#fff;padding:20px;border-radius:10px}
input{width:100%;padding:10px;margin:8px 0}
.upload{width:80px;height:80px;border-radius:50%;background:#333;color:#fff;display:flex;align-items:center;justify-content:center;font-size:35px;margin:10px auto;cursor:pointer}
button{width:100%;padding:10px;background:green;color:#fff;border:none}
</style>
</head>
<body>

<h2>SEND NOTES</h2>
<div class="box">
<input id="cls" placeholder="Class">
<input id="sub" placeholder="Subject">
<input id="title" placeholder="Title">
<div class="upload" onclick="file.click()">+</div>
<input type="file" id="file" hidden onchange="pick(event)">
<button onclick="save()">Send</button>
</div>

<script>
let u=localStorage.getItem("currentUser"); if(!u)location.href="index.html";
let data64=null;

function pick(e){
 let r=new FileReader();
 r.onload=()=>data64=r.result;
 r.readAsDataURL(e.target.files[0]);
}

function save(){
 if(!cls.value||!sub.value||!title.value||!data64)return alert("Fill all");
 let d={class:cls.value,subject:sub.value,title:title.value,fileData:data64,user:u};
 localStorage.setItem("notes_"+Date.now(),JSON.stringify(d));
 alert("Saved");
}
</script>

</body>
</html>
