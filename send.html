<!DOCTYPE html>
<html>
<head>
    <title>Send Notes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:white;
        }
        .nav{ padding:15px 25px; }
        .nav a{
            text-decoration:none;
            color:white;
            background:#1e293b;
            padding:8px 16px;
            border-radius:6px;
        }
        .container{
            max-width:420px;
            margin:40px auto;
            background:#1e293b;
            padding:30px;
            border-radius:14px;
            box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }
        h2{ text-align:center; margin-bottom:25px; letter-spacing:1px; }
        .field{ margin-bottom:18px; }
        .field label{
            font-size:14px;
            display:block;
            margin-bottom:6px;
            color:#cbd5e1;
        }
        .field input{
            width:100%;
            padding:12px;
            border-radius:8px;
            border:none;
            outline:none;
            background:#334155;
            color:white;
        }
        .upload-area{
            margin:20px 0;
            border:2px dashed #64748b;
            border-radius:10px;
            padding:25px;
            text-align:center;
            cursor:pointer;
        }
        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#3b82f6;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }
        .msg{ margin-top:15px; text-align:center; font-weight:bold; }
    </style>
</head>

<body>

<div class="nav">
    <a href="dashboard.html">← Dashboard</a>
</div>

<div class="container">
    <h2>Send Notes</h2>

    <div class="field">
        <label>Class</label>
        <input type="text" id="class">
    </div>

    <div class="field">
        <label>Subject</label>
        <input type="text" id="subject">
    </div>

    <div class="field">
        <label>Title</label>
        <input type="text" id="title">
    </div>

    <div class="upload-area" onclick="chooseFile()">
        Upload File
    </div>

    <input type="file" id="file" hidden>

    <button onclick="saveNotes()">Send Notes</button>
    <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_0wFUxxNk3Dc8s3jYuUq85kEwYqoFLGw",
  authDomain: "school-project-7beb3.firebaseapp.com",
  projectId: "school-project-7beb3",
  storageBucket: "school-project-7beb3.firebasestorage.app",
  messagingSenderId: "846563976783",
  appId: "1:846563976783:web:7dfdb561fa79b17cefec3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let fileData=null;

window.chooseFile = function(){
    document.getElementById("file").click();
}

document.getElementById("file").addEventListener("change",(e)=>{
    fileData=e.target.files[0];
});

window.saveNotes = async function(){
    let cls=document.getElementById("class").value;
    let sub=document.getElementById("subject").value;
    let title=document.getElementById("title").value;
    let user=localStorage.getItem("currentUser");

    if(!cls || !sub || !title || !fileData){
        showMsg("Fill all details","red");
        return;
    }

    await addDoc(collection(db,"notes"),{
        class:cls,
        subject:sub,
        title:title,
        fileName:fileData.name,
        fileURL:URL.createObjectURL(fileData),
        user:user,
        time:Date.now()
    });

    showMsg("Notes Sent Successfully ✅","#22c55e");
}

function showMsg(text,color){
    let m=document.getElementById("msg");
    m.innerText=text;
    m.style.color=color;
}
</script>

</body>
</html>
