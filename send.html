<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white;text-align:center;font-family:Arial">

<textarea id="note"></textarea><br>
<button onclick="send()">SEND</button>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({databaseURL:"https://school-project-7beb3-default-rtdb.firebaseio.com/"});
let scs=localStorage.getItem("currentUser");

function send(){
 firebase.database().ref("notes").push({
  by:scs,
  text:note.value
 });
}
</script>
</body>
</html>
