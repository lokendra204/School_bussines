<script>
let fileBase64 = null;
let fileName = "";

function chooseFile(){
    document.getElementById("file").click();
}

function fileSelected(e){
    let file = e.target.files[0];
    fileName = file.name;

    let reader = new FileReader();
    reader.onload = function(event){
        fileBase64 = event.target.result;

        document.getElementById("uploadBtn").innerText = "✔";
        document.getElementById("uploadBtn").style.background = "green";
    }
    reader.readAsDataURL(file);
}

function saveNotes(){

    let cls = document.getElementById("class").value;
    let sub = document.getElementById("subject").value;
    let title = document.getElementById("title").value;

    if(cls=="" || sub=="" || title=="" || !fileBase64){
        document.getElementById("msg").innerText = "Enter all details";
        document.getElementById("msg").style.color = "red";
        return;
    }

    let user = localStorage.getItem("currentUser");

    let data = {
        class: cls,
        subject: sub,
        title: title,
        fileName: fileName,
        fileData: fileBase64,
        user: user
    };

    localStorage.setItem("notes_" + Date.now(), JSON.stringify(data));

    document.getElementById("msg").innerText = "Notes successfully saved";
    document.getElementById("msg").style.color = "green";

    document.getElementById("class").value="";
    document.getElementById("subject").value="";
    document.getElementById("title").value="";

    fileBase64=null;

    document.getElementById("uploadBtn").innerText = "+";
    document.getElementById("uploadBtn").style.background = "#333";
}
</script>
