<!DOCTYPE html>
<html>
<head>
    <title>View Notes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(120deg,#f6d365,#fda085);
            padding:30px 15px;
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:25px;
            letter-spacing:2px;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        .note-card{
            background:white;
            border-radius:14px;
            box-shadow:0 10px 25px rgba(0,0,0,0.25);
            padding:20px;
            margin-bottom:20px;
            transition:0.3s;
        }

        .note-card:hover{
            transform:translateY(-5px);
        }

        .title{
            font-size:22px;
            font-weight:bold;
            margin-bottom:10px;
            color:#222;
        }

        .meta{
            color:#555;
            line-height:1.6;
            margin-bottom:15px;
        }

        .download-btn{
            display:inline-block;
            padding:10px 18px;
            background:#ff7a18;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        .empty{
            text-align:center;
            margin-top:40px;
            color:#444;
            font-size:18px;
        }
    </style>
</head>

<body>

<h1>📥 VIEW NOTES</h1>

<div class="container" id="container"></div>

<script>
function loadNotes(){
    let container = document.getElementById("container");
    container.innerHTML = "";

    for(let i=0;i<localStorage.length;i++){
        let key = localStorage.key(i);

        if(key.startsWith("notes_")){
            let data = JSON.parse(localStorage.getItem(key));

            let card = document.createElement("div");
            card.className = "note-card";

            card.innerHTML = `
                <div class="title">${data.title}</div>
                <div class="meta">
                    <b>Class:</b> ${data.class}<br>
                    <b>Subject:</b> ${data.subject}<br>
                    <b>Uploaded by:</b> ${data.user}
                </div>
                <a class="download-btn" href="${data.fileURL}" download="${data.fileName}">
                    ⬇ Download Notes
                </a>
            `;

            container.appendChild(card);
        }
    }

    if(container.innerHTML === ""){
        container.innerHTML = "<div class='empty'>No notes uploaded yet.</div>";
    }
}

loadNotes();
</script>

</body>
</html>
