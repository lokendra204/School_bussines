<!DOCTYPE html>
<html>
<head>
    <title>Login / Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{font-family:Arial;background:#f2f2f2;margin:0;display:flex;justify-content:center;align-items:center;height:100vh}
        .box{background:#fff;padding:40px;width:320px;border-radius:8px;box-shadow:0 5px 15px rgba(0,0,0,.2);text-align:center}
        input{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:4px}
        button{padding:10px 15px;margin:5px;background:#4CAF50;color:#fff;border:none;border-radius:4px;cursor:pointer}
        .msg{margin-top:10px;font-size:14px}
    </style>
</head>
<body>

<div class="box">
    <h2>Login / Sign Up</h2>

    <input id="scs" placeholder="Enter SCS Number">
    <input id="username" placeholder="Enter Username (for Sign Up)">
    <input id="pass" type="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>

    <div class="msg" id="msg"></div>
</div>

<script>

function signup(){
    let scs = scs.value;
    let uname = username.value;
    let p = pass.value;

    if(!scs || !uname || !p) return show("Enter all details","red");

    if(localStorage.getItem("user_"+scs)){
        show("User already exists. Please login.","red");
    }else{
        localStorage.setItem("user_"+scs, p);
        localStorage.setItem("user_"+scs+"_name", uname);
        show("Account created! Now login.","green");
    }
}

function login(){
    let scs = scs.value;
    let p = pass.value;

    let saved = localStorage.getItem("user_"+scs);

    if(!saved){
        show("User not found. Please sign up.","red");
    }else if(saved !== p){
        show("Wrong password","red");
    }else{
        localStorage.setItem("currentUser", scs);
        location.href="dashboard.html";
    }
}

function show(t,c){
    msg.innerText = t;
    msg.style.color = c;
}

</script>

</body>
</html>
