<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<input id="username" placeholder="Username"><br>
<input id="scs" placeholder="SCS"><br>
<input id="password" type="password" placeholder="Password"><br>
<button id="btn">Continue</button>

<p id="msg" style="color:red"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_0wFUxxNk3Dc8s3jYuUq85kEwYqoFLGw",
  authDomain: "school-project-7beb3.firebaseapp.com",
  projectId: "school-project-7beb3",
  appId: "1:846563976783:web:7dfdb561fa79b17cefec3a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("btn").onclick = async () => {
    const scs = scs.value.trim();
    const pass = password.value.trim();
    const email = scs + "@scs.com";

    try{
        await signInWithEmailAndPassword(auth, email, pass);
        msg.innerText = "Login success";
    }catch(e){
        try{
            await createUserWithEmailAndPassword(auth, email, pass);
            msg.innerText = "Account created";
        }catch(err){
            msg.innerText = err.message;
        }
    }
};
</script>

</body>
</html>
