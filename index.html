<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .login-box{
            background:white;
            padding:35px;
            width:330px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            text-align:center;
        }
        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:6px;
        }
        button{
            width:100%;
            padding:12px;
            background:#667eea;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login / Sign Up</h2>
    <input type="text" id="username" placeholder="Enter Username">
    <input type="text" id="scs" placeholder="Enter your SCS number">
    <input type="password" id="password" placeholder="Enter Password">
    <button id="loginBtn">Continue</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_0wFUxxNk3Dc8s3jYuUq85kEwYqoFLGw",
  authDomain: "school-project-7beb3.firebaseapp.com",
  projectId: "school-project-7beb3",
  storageBucket: "school-project-7beb3.firebasestorage.app",
  messagingSenderId: "846563976783",
  appId: "1:846563976783:web:7dfdb561fa79b17cefec3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("loginBtn").addEventListener("click", async () => {
    let username = document.getElementById("username").value.trim();
    let scs = document.getElementById("scs").value.trim();
    let pass = document.getElementById("password").value.trim();

    if(!username || !scs || !pass){
        alert("Fill all details");
        return;
    }

    const ref = doc(db, "users", scs);
    const snap = await getDoc(ref);

    if(!snap.exists()){
        await setDoc(ref, { username, password: pass });
    } else {
        if(snap.data().password !== pass){
            alert("Wrong password");
            return;
        }
    }

    localStorage.setItem("currentUser", scs);
    window.location.href = "dashboard.html";
});
</script>

</body>
</html>
