<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{font-family:Arial;background:#f2f2f2;margin:0;display:flex;justify-content:center;align-items:center;height:100vh}
        .box{background:#fff;padding:40px;width:320px;border-radius:8px;box-shadow:0 5px 15px rgba(0,0,0,.2);text-align:center}
        input{width:100%;padding:12px;margin:10px 0;border:1px solid #ccc;border-radius:4px}
        button{padding:12px 25px;background:#4CAF50;color:#fff;border:none;border-radius:4px;cursor:pointer}
    </style>
</head>
<body>
<div class="box">
    <h2>Login</h2>
    <input id="username" placeholder="Enter your SCS number">
    <input id="password" type="password" placeholder="Enter password">
    <button onclick="login()">Login</button>
</div>
<script>
function login(){
 let u=username.value,p=password.value;
 if(u&&p){localStorage.setItem("currentUser",u);location.href="dashboard.html";}
 else alert("Enter details");
}
</script>
</body>
</html>
