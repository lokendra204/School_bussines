<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#1e1e1e,#3a2b1f);
            color:white;
            text-align:center;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 25px;
        }

        .profile{
            display:flex;
            align-items:center;
            gap:10px;
            cursor:pointer;
        }

        .profile-circle{
            width:55px;
            height:55px;
            border-radius:50%;
            background:white;
            color:black;
            display:flex;
            justify-content:center;
            align-items:center;
            font-weight:bold;
            font-size:20px;
        }

        .username{
            font-size:18px;
            font-weight:bold;
        }

        h1{
            margin-top:60px;
            font-size:48px;
            letter-spacing:6px;
        }

        .welcome-user{
            margin-top:10px;
            font-size:22px;
            opacity:0.9;
        }

        .btn-container{
            margin-top:80px;
            display:flex;
            justify-content:center;
            gap:40px;
            flex-wrap:wrap;
        }

        .btn{
            width:240px;
            padding:25px 0;
            font-size:28px;
            font-weight:bold;
            border-radius:12px;
            text-decoration:none;
            color:white;
            transition:0.3s;
            box-shadow:0 8px 20px rgba(0,0,0,0.5);
        }

        .send{
            background:#e53935;
        }

        .receive{
            background:#00acc1;
        }

        .btn:hover{
            transform:scale(1.08);
        }

        @media(max-width:700px){
            h1{font-size:32px;}
            .btn{width:180px;font-size:20px;}
        }
    </style>
</head>

<body>

<div class="top-bar">
    <div class="profile" onclick="goProfile()">
        <div class="profile-circle" id="initials">U</div>
        <div class="username" id="usernameTop"></div>
    </div>
</div>

<h1>WELCOME</h1>
<div class="welcome-user" id="usernameBelow"></div>

<div class="btn-container">
    <a href="send.html" class="btn send">SEND NOTES</a>
    <a href="receive.html" class="btn receive">RECEIVE NOTES</a>
</div>

<script>
let user = localStorage.getItem("currentUser") || "User";

// Username (login time wala)
let uname = localStorage.getItem(user+"_username") || user;

// Top bar
document.getElementById("usernameTop").innerText = uname;

// Below welcome
document.getElementById("usernameBelow").innerText = uname;

// Initials
document.getElementById("initials").innerText = uname.charAt(0).toUpperCase();

function goProfile(){
    window.location.href = "profile.html";
}
</script>

</body>
</html>
