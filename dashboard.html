<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#f5f5f5;
            text-align:center;
        }

        /* Top Left Profile Button */
        .top-circle{
            position:absolute;
            top:20px;
            left:20px;
            width:60px;
            height:60px;
            border-radius:50%;
            background:black;
            cursor:pointer;
            overflow:hidden;
        }

        .top-circle img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        h1{
            margin-top:80px;
            font-size:60px;
            letter-spacing:10px;
            text-shadow:2px 4px 6px rgba(0,0,0,0.3);
        }

        .container{
            display:flex;
            justify-content:center;
            align-items:center;
            margin-top:80px;
            gap:60px;
            flex-wrap:wrap;
        }

        .btn{
            width:300px;
            padding:40px 0;
            font-size:45px;
            font-weight:bold;
            border-radius:12px;
            color:black;
            text-decoration:none;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
            transition:0.3s;
            display:inline-block;
        }

        .send{
            background:red;
        }

        .receive{
            background:cyan;
        }

        .btn:hover{
            transform:scale(1.08);
        }

        @media(max-width:900px){
            h1{font-size:40px;}
            .btn{width:220px;font-size:30px;}
        }
    </style>
</head>

<body>

<!-- Profile Button -->
<div class="top-circle" onclick="goProfile()">
    <img id="profilePic">
</div>

<h1>WELCOME</h1>

<div class="container">
    <a href="send.html" class="btn send">SEND</a>
    <a href="receive.html" class="btn receive">RECEIVE</a>
</div>

<script>
function goProfile(){
    window.location.href = "profile.html";
}

// Load profile picture if exists
let user = localStorage.getItem("currentUser");
let pic = localStorage.getItem(user + "_pic");
if(pic){
    document.getElementById("profilePic").src = pic;
}
</script>

</body>
</html>
