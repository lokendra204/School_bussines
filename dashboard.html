<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#f5f5f5;
            text-align:center;
        }

        /* Profile area */
        .profile-area{
            position:absolute;
            top:15px;
            left:15px;
            text-align:center;
            cursor:pointer;
        }

        .top-circle{
            width:65px;
            height:65px;
            border-radius:50%;
            background:#000;
            overflow:hidden;
            margin:auto;
        }

        .top-circle img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .username{
            font-size:12px;
            margin-top:5px;
            font-weight:bold;
        }

        h1{
            margin-top:80px;
            font-size:60px;
            letter-spacing:10px;
        }

        .container{
            display:flex;
            justify-content:center;
            align-items:center;
            margin-top:40px;
            gap:60px;
            flex-wrap:wrap;
        }

        .btn{
            width:300px;
            padding:40px 0;
            font-size:45px;
            font-weight:bold;
            border-radius:12px;
            color:black;
            text-decoration:none;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
            transition:0.3s;
            display:inline-block;
        }

        .send{ background:red; }
        .receive{ background:cyan; }

        .btn:hover{
            transform:scale(1.08);
        }

        .character{
            margin-top:30px;
        }

        .character img{
            height:420px;
            max-width:90%;
        }

        @media(max-width:900px){
            h1{font-size:40px;}
            .btn{width:220px;font-size:30px;}
            .character img{height:260px;}
        }
    </style>
</head>

<body>

<!-- Profile with username -->
<div class="profile-area" onclick="goProfile()">
    <div class="top-circle">
        <img id="profilePic">
    </div>
    <div class="username" id="uname"></div>
</div>

<h1>WELCOME</h1>

<div class="container">
    <a href="send.html" class="btn send">SEND</a>
    <a href="receive.html" class="btn receive">RECEIVE</a>
</div>

<div class="character">
    <img src="https://i.imgur.com/9Xn4K6G.png" alt="Toji">
</div>

<script>
let user = localStorage.getItem("currentUser");

// Show username from login
let name = localStorage.getItem(user+"_username") || user;
document.getElementById("uname").innerText = name;

// Show profile pic if exists
let pic = localStorage.getItem(user+"_pic");
if(pic){
    document.getElementById("profilePic").src = pic;
}else{
    document.getElementById("profilePic").src = "https://i.imgur.com/4Z7K5fM.png"; // default avatar
}

function goProfile(){
    window.location.href = "profile.html";
}
</script>

</body>
</html>
