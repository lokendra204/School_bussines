<!DOCTYPE html>
<html>
<head>
    <title>DASHBOARD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:white;
            text-align:center;
        }

        .top-right{
            position:absolute;
            top:15px;
            right:20px;
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        .top-btn{
            padding:10px 15px;
            background:#22c55e;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
            text-transform:uppercase;
        }

        .friend-list-btn{
            background:#14b8a6;
        }

        .top-bar{
            display:flex;
            align-items:center;
            padding:15px 20px;
        }

        .profile{
            display:flex;
            align-items:center;
            gap:10px;
            cursor:pointer;
        }

        .profile-circle{
            width:50px;
            height:50px;
            border-radius:50%;
            background:white;
            color:black;
            display:flex;
            justify-content:center;
            align-items:center;
            font-weight:bold;
            font-size:20px;
            overflow:hidden;
        }

        .profile-circle img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .username-top{
            font-size:16px;
            font-weight:bold;
        }

        h1{
            margin-top:60px;
            font-size:42px;
            letter-spacing:4px;
        }

        .welcome-user{
            margin-top:8px;
            font-size:22px;
            color:#cbd5e1;
        }

        .btn-rows{
            margin-top:60px;
            display:flex;
            flex-direction:column;
            gap:30px;
            align-items:center;
        }

        .row{
            display:flex;
            gap:40px;
        }

        .btn{
            width:260px;
            padding:18px 0;
            font-size:22px;
            font-weight:bold;
            border-radius:10px;
            text-decoration:none;
            color:white;
            transition:0.3s;
            box-shadow:0 8px 20px rgba(0,0,0,0.5);
            text-transform:uppercase;
        }

        .send{ background:#e53935; }
        .receive{ background:#00acc1; }
        .vote{ background:#8b5cf6; }
        .extra{ background:#f59e0b; }

        .btn:hover{
            transform:scale(1.06);
        }

        @media(max-width:650px){
            .row{
                flex-direction:column;
                gap:20px;
            }
        }
    </style>
</head>

<body>

<div class="top-right">
    <div class="top-btn" onclick="goAddFriend()">ADD FRIEND</div>
    <div class="top-btn friend-list-btn" onclick="goFriendList()">FRIEND LIST</div>
</div>

<div class="top-bar">
    <div class="profile" onclick="goProfile()">
        <div class="profile-circle" id="profileCircle"></div>
        <div class="username-top" id="usernameTop"></div>
    </div>
</div>

<h1>WELCOME</h1>
<div class="welcome-user" id="usernameBelow"></div>

<div class="btn-rows">
    <div class="row">
        <a href="send.html" class="btn send">SEND NOTES</a>
        <a href="receive.html" class="btn receive">RECEIVE NOTES</a>
    </div>
    <div class="row">
        <a href="vote.html" class="btn vote">VOTE HOUSE</a>
        <a href="youruploads.html" class="btn extra">UPLOAD BY YOU</a>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_0wFUxxNk3Dc8s3jYuUq85kEwYqoFLGw",
  authDomain: "school-project-7beb3.firebaseapp.com",
  projectId: "school-project-7beb3",
  storageBucket: "school-project-7beb3.firebasestorage.app",
  messagingSenderId: "846563976783",
  appId: "1:846563976783:web:7dfdb561fa79b17cefec3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let scs = localStorage.getItem("currentUser");

async function loadUser(){
    const snap = await getDoc(doc(db, "users", scs));
    if(snap.exists()){
        let data = snap.data();
        let uname = data.username;
        let pic = data.pic;

        document.getElementById("usernameTop").innerText = uname;
        document.getElementById("usernameBelow").innerText = uname;

        let circle = document.getElementById("profileCircle");
        if(pic){
            circle.innerHTML = "<img src='"+pic+"'>";
        }else{
            circle.innerText = uname.charAt(0).toUpperCase();
        }
    }
}

loadUser();

function goProfile(){ window.location.href="profile.html"; }
function goAddFriend(){ window.location.href="addfriend.html"; }
function goFriendList(){ window.location.href="friends.html"; }
</script>

</body>
</html>
