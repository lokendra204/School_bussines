<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_0wFUxxNk3Dc8s3jYuUq85kEwYqoFLGw",
  authDomain: "school-project-7beb3.firebaseapp.com",
  projectId: "school-project-7beb3",
  storageBucket: "school-project-7beb3.firebasestorage.app",
  messagingSenderId: "846563976783",
  appId: "1:846563976783:web:7dfdb561fa79b17cefec3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 current user SCS saved at login time
let scs = localStorage.getItem("currentUser");

if(!scs){
    window.location.href = "index.html";
}

async function loadUser(){
    const snap = await getDoc(doc(db,"users",scs));

    if(!snap.exists()) return;

    let data = snap.data();

    document.getElementById("usernameTop").innerText = data.username;
    document.getElementById("usernameBelow").innerText = data.username;

    let circle = document.getElementById("profileCircle");

    if(data.pic){
        circle.innerHTML = "<img src='"+data.pic+"'>";
    }else{
        circle.innerText = data.username.charAt(0).toUpperCase();
    }
}

loadUser();

window.goProfile = function(){
    window.location.href = "profile.html";
}
window.goAddFriend = function(){
    window.location.href = "addfriend.html";
}
window.goFriendList = function(){
    window.location.href = "friends.html";
}
</script>
