<!DOCTYPE html>
<html>
<head>
<title>Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
}

/* Header */
.header{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 15px;
    background:#111827;
    border-bottom:1px solid #1f2937;
}

.header img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
}

.header .name{
    font-size:18px;
    font-weight:bold;
}

/* Chat Area */
.chat-box{
    height:75vh;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.msg{
    max-width:70%;
    padding:10px 14px;
    border-radius:8px;
    font-size:14px;
    word-wrap:break-word;
}

.me{
    background:#2563eb;
    align-self:flex-end;
}

.friend{
    background:#374151;
    align-self:flex-start;
}

/* Input Area */
.input-area{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    gap:10px;
    padding:10px;
    background:#111827;
}

input{
    flex:1;
    padding:12px;
    border-radius:6px;
    border:none;
    outline:none;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:6px;
    background:#10b981;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <img id="friendPic">
    <div class="name" id="friendName"></div>
</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="Type a message...">
    <button onclick="sendMsg()">Send</button>
</div>

<script>
let me = localStorage.getItem("currentUser");
let friend = localStorage.getItem("chatWith");

// Friend name & pic
let uname = localStorage.getItem(friend+"_username") || friend;
let pic = localStorage.getItem(friend+"_pic");

document.getElementById("friendName").innerText = uname;

if(pic){
    document.getElementById("friendPic").src = pic;
}else{
    document.getElementById("friendPic").src = "https://i.imgur.com/3ZQ3Z4F.png";
}

// Chat logic
let chatKey = "chat_" + [me, friend].sort().join("_");

function loadChat(){
    let chats = JSON.parse(localStorage.getItem(chatKey)) || [];
    let box = document.getElementById("chatBox");
    box.innerHTML = "";

    chats.forEach(c=>{
        let div = document.createElement("div");
        div.className = "msg " + (c.sender===me ? "me":"friend");
        div.innerText = c.text;
        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}

function sendMsg(){
    let input = document.getElementById("msgInput");
    let text = input.value.trim();
    if(text==="") return;

    let chats = JSON.parse(localStorage.getItem(chatKey)) || [];
    chats.push({sender:me, text:text});
    localStorage.setItem(chatKey, JSON.stringify(chats));

    input.value="";
    loadChat();
}

// ENTER SEND
document.getElementById("msgInput").addEventListener("keypress", function(e){
    if(e.key==="Enter"){
        sendMsg();
    }
});

loadChat();
</script>

</body>
</html>
