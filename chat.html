<!DOCTYPE html>
<html>
<head>
    <title>CHAT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:white;
            height:100vh;
            display:flex;
            flex-direction:column;
        }

        .top{
            padding:15px;
            background:#1e293b;
            display:flex;
            align-items:center;
            gap:15px;
        }

        .back{
            cursor:pointer;
            font-size:18px;
        }

        .friend-name{
            font-size:18px;
            font-weight:bold;
        }

        .messages{
            flex:1;
            padding:20px;
            overflow-y:auto;
        }

        .message{
            margin-bottom:15px;
            display:flex;
            gap:10px;
        }

        .me{
            justify-content:flex-end;
        }

        .msg-bubble{
            max-width:70%;
            padding:12px 16px;
            border-radius:18px;
            word-wrap:break-word;
        }

        .me .msg-bubble{
            background:#22c55e;
            border-bottom-right-radius:6px;
        }

        .friend .msg-bubble{
            background:#475569;
            border-bottom-left-radius:6px;
        }

        .msg-time{
            font-size:11px;
            opacity:0.7;
            margin-top:4px;
        }

        .input-area{
            padding:15px;
            background:#1e293b;
            display:flex;
            gap:10px;
        }

        input{
            flex:1;
            padding:12px;
            border:none;
            border-radius:20px;
            background:#334155;
            color:white;
            outline:none;
        }

        button{
            padding:12px 20px;
            background:#3b82f6;
            color:white;
            border:none;
            border-radius:20px;
            cursor:pointer;
            font-weight:bold;
        }

        .empty{
            text-align:center;
            color:#94a3b8;
            margin-top:50px;
        }
    </style>
</head>

<body>

<div class="top">
    <div class="back" onclick="goBack()">←</div>
    <div class="friend-name" id="friendName"></div>
</div>

<div class="messages" id="messages">
    <div class="empty">No messages yet. Start chatting!</div>
</div>

<div class="input-area">
    <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKey(event)">
    <button onclick="sendMessage()">SEND</button>
</div>

<script>
let me = localStorage.getItem("currentUser");
let friendSCS = localStorage.getItem("chatFriend");
let friendName = localStorage.getItem(friendSCS + "_username") || friendSCS;

document.getElementById("friendName").innerText = friendName;

// Load chat history
function loadChat(){
    let messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";
    
    let chatKey = getChatKey(me, friendSCS);
    let messages = JSON.parse(localStorage.getItem(chatKey)) || [];
    
    if(messages.length === 0){
        messagesDiv.innerHTML = '<div class="empty">No messages yet. Start chatting!</div>';
        return;
    }
    
    messages.forEach(msg => {
        displayMessage(msg);
    });
    
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function getChatKey(user1, user2){
    return "chat_" + [user1, user2].sort().join("_");
}

function sendMessage(){
    let input = document.getElementById("messageInput");
    let text = input.value.trim();
    
    if(text === "") return;
    
    let chatKey = getChatKey(me, friendSCS);
    let messages = JSON.parse(localStorage.getItem(chatKey)) || [];
    
    let message = {
        text: text,
        sender: me,
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    };
    
    messages.push(message);
    localStorage.setItem(chatKey, JSON.stringify(messages));
    
    input.value = "";
    loadChat();
}

function displayMessage(msg){
    let messagesDiv = document.getElementById("messages");
    let messageDiv = document.createElement("div");
    
    let className = msg.sender === me ? "message me" : "message friend";
    messageDiv.className = className;
    
    messageDiv.innerHTML = `
        <div class="msg-bubble">${msg.text}</div>
        <div class="msg-time">${msg.time}</div>
    `;
    
    messagesDiv.appendChild(messageDiv);
}

function handleKey(event){
    if(event.key === "Enter"){
        sendMessage();
    }
}

function goBack(){
    window.location.href = "friends.html";
}

// Load on start
loadChat();
</script>

</body>
</html>
