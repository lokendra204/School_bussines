<!DOCTYPE html>
<html>
<head>
<title>Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* SAME CSS — NO CHANGE */
body{ margin:0; font-family: Arial, Helvetica, sans-serif; background:#0f172a; color:white; }
.header{ display:flex; align-items:center; gap:12px; padding:12px 15px; background:#111827; }
.header img{ width:42px; height:42px; border-radius:50%; object-fit:cover; }
.header .name{ font-size:18px; font-weight:bold; }
.chat-box{ height:75vh; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px; }
.msg{ max-width:70%; padding:10px 14px; border-radius:8px; font-size:14px; }
.me{ background:#2563eb; align-self:flex-end; }
.friend{ background:#374151; align-self:flex-start; }
.input-area{ position:fixed; bottom:0; width:100%; display:flex; gap:10px; padding:10px; background:#111827; }
input{ flex:1; padding:12px; border-radius:6px; border:none; }
button{ padding:12px 18px; border:none; border-radius:6px; background:#10b981; color:white; font-weight:bold; }
</style>
</head>

<body>

<div class="header">
    <img id="friendPic">
    <div class="name" id="friendName"></div>
</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="Type a message...">
    <button onclick="sendMsg()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc,
  query, orderBy, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_0wFUxxNk3Dc8s3jYuUq85kEwYqoFLGw",
  authDomain: "school-project-7beb3.firebaseapp.com",
  projectId: "school-project-7beb3",
  storageBucket: "school-project-7beb3.firebasestorage.app",
  messagingSenderId: "846563976783",
  appId: "1:846563976783:web:7dfdb561fa79b17cefec3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let me = localStorage.getItem("currentUser");
let friend = localStorage.getItem("chatFriend");

// Header info from localStorage (design same)
let uname = localStorage.getItem(friend+"_username") || friend;
let pic = localStorage.getItem(friend+"_pic");

document.getElementById("friendName").innerText = uname;
if(pic){ document.getElementById("friendPic").src = pic; }

// ✅ Unique chat id for both users
let chatId = [me, friend].sort().join("_");
let chatRef = collection(db, "chats", chatId, "messages");

const box = document.getElementById("chatBox");

// ✅ REALTIME LISTENER
const q = query(chatRef, orderBy("time","asc"));
onSnapshot(q, (snapshot)=>{
    box.innerHTML = "";
    snapshot.forEach(doc=>{
        let c = doc.data();
        let div = document.createElement("div");
        div.className = "msg " + (c.sender===me ? "me":"friend");
        div.innerText = c.text;
        box.appendChild(div);
    });
    box.scrollTop = box.scrollHeight;
});

window.sendMsg = async function(){
    let input = document.getElementById("msgInput");
    let text = input.value.trim();
    if(text==="") return;

    await addDoc(chatRef,{
        sender: me,
        text: text,
        time: Date.now()
    });

    input.value="";
}

// ENTER key
document.getElementById("msgInput").addEventListener("keypress", function(e){
    if(e.key==="Enter"){
        sendMsg();
    }
});
</script>

</body>
</html>
