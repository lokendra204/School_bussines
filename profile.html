<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .back-btn{
            position:absolute;
            top:15px;
            left:15px;
            background:black;
            color:white;
            padding:8px 12px;
            border-radius:6px;
            cursor:pointer;
            font-size:14px;
        }

        .card{
            background:white;
            width:340px;
            border-radius:15px;
            padding:25px;
            box-shadow:0 15px 35px rgba(0,0,0,0.3);
            text-align:center;
        }

        h2{ margin-bottom:15px; }

        .circle{
            width:140px;
            height:140px;
            border-radius:50%;
            background:#333;
            margin:15px auto;
            overflow:hidden;
            cursor:pointer;
            position:relative;
            border:4px solid #667eea;
        }

        .circle img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .plus{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            font-size:55px;
            color:white;
        }

        input[type="file"]{ display:none; }

        .field{
            text-align:left;
            margin-top:12px;
        }

        .field label{
            font-weight:bold;
            font-size:13px;
        }

        .field input{
            width:100%;
            padding:8px;
            margin-top:5px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        .btn{
            margin-top:15px;
            width:100%;
            padding:10px;
            border:none;
            border-radius:8px;
            background:#667eea;
            color:white;
            font-size:15px;
            cursor:pointer;
        }

        .scs{
            font-size:13px;
            margin-top:8px;
            color:#555;
        }
    </style>
</head>

<body>

<div class="back-btn" onclick="goBack()">⬅ Back</div>

<div class="card">

    <h2>Your Profile</h2>

    <div class="circle" onclick="chooseImage()">
        <span class="plus" id="plus">+</span>
        <img id="preview">
    </div>

    <input type="file" id="fileInput" accept="image/*" onchange="loadImage(event)">

    <div class="scs">SCS No: <span id="scs"></span></div>

    <div class="field">
        <label>Username</label>
        <input id="username">
    </div>

    <div class="field">
        <label>Display Name</label>
        <input id="display">
    </div>

    <button class="btn" onclick="saveData()">Save Changes</button>

</div>

<script>
let user = localStorage.getItem("currentUser");

function goBack(){
    window.location.href = "dashboard.html";
}

function chooseImage(){
    document.getElementById("fileInput").click();
}

function loadImage(event){
    let img = document.getElementById("preview");
    img.src = URL.createObjectURL(event.target.files[0]);
    document.getElementById("plus").style.display="none";

    localStorage.setItem(user+"_pic", img.src);
    alert("✅ Profile picture saved");
}

window.onload = function(){
    document.getElementById("scs").innerText = user;

    let savedUsername = localStorage.getItem(user+"_username");
    document.getElementById("username").value = savedUsername;

    let dname = localStorage.getItem(user+"_display") || "";
    document.getElementById("display").value = dname;

    let pic = localStorage.getItem(user+"_pic");
    if(pic){
        document.getElementById("preview").src = pic;
        document.getElementById("plus").style.display="none";
    }
}

function saveData(){
    let uname = document.getElementById("username").value;
    let dname = document.getElementById("display").value;

    localStorage.setItem(user+"_username", uname);
    localStorage.setItem(user+"_display", dname);

    alert("✅ Profile details saved");
}
</script>

</body>
</html>
