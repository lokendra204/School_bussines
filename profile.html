<!DOCTYPE html>
<html>
<head>
    <title>PROFILE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:white;
            text-align:center;
        }

        h2{
            margin-top:25px;
            letter-spacing:3px;
        }

        .container{
            margin-top:30px;
        }

        .circle{
            width:150px;
            height:150px;
            border-radius:50%;
            background:#1e293b;
            margin:20px auto;
            overflow:hidden;
            cursor:pointer;
            position:relative;
            border:3px solid white;
        }

        .circle img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .plus{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            font-size:60px;
            color:#94a3b8;
        }

        input[type="file"]{
            display:none;
        }

        .info-box{
            width:320px;
            margin:20px auto;
            background:#1e293b;
            padding:20px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.5);
            text-align:left;
        }

        .label{
            font-size:14px;
            color:#cbd5e1;
            margin-top:10px;
        }

        .edit{
            width:100%;
            padding:8px;
            margin-top:5px;
            border:none;
            border-radius:5px;
        }

        .btn{
            margin-top:15px;
            padding:10px;
            width:100%;
            background:#16a34a;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-weight:bold;
        }

        .msg{
            margin-top:10px;
            text-align:center;
            color:#4ade80;
            font-size:14px;
        }

        .back{
            margin:25px auto;
            padding:10px 15px;
            background:black;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h2>PROFILE</h2>

<div class="container">

    <div class="circle" onclick="chooseImage()">
        <span class="plus" id="plus">+</span>
        <img id="preview">
    </div>

    <input type="file" id="fileInput" accept="image/*" onchange="loadImage(event)">

    <div class="info-box">

        <div class="label">SCS NO:</div>
        <div id="scs"></div>

        <div class="label">USERNAME:</div>
        <input class="edit" id="username">

        <div class="label">DISPLAY NAME:</div>
        <input class="edit" id="display">

        <button class="btn" onclick="saveData()">SAVE CHANGES</button>
        <div class="msg" id="msg"></div>

    </div>

</div>

<button class="back" onclick="window.location.href='dashboard.html'">BACK TO DASHBOARD</button>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_0wFUxxNk3Dc8s3jYuUq85kEwYqoFLGw",
  authDomain: "school-project-7beb3.firebaseapp.com",
  projectId: "school-project-7beb3",
  storageBucket: "school-project-7beb3.firebasestorage.app",
  messagingSenderId: "846563976783",
  appId: "1:846563976783:web:7dfdb561fa79b17cefec3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = localStorage.getItem("currentUser");
document.getElementById("scs").innerText = user;

async function loadProfile(){
    const snap = await getDoc(doc(db,"users",user));
    if(snap.exists()){
        let data = snap.data();
        document.getElementById("username").value = data.username || "";
        document.getElementById("display").value = data.display || "";

        if(data.pic){
            document.getElementById("preview").src = data.pic;
            document.getElementById("plus").style.display="none";
        }
    }
}

window.onload = loadProfile;

function chooseImage(){
    document.getElementById("fileInput").click();
}

let imageBase64 = "";

function loadImage(event){
    let reader = new FileReader();
    reader.onload = function(){
        imageBase64 = reader.result;
        document.getElementById("preview").src = imageBase64;
        document.getElementById("plus").style.display="none";
    }
    reader.readAsDataURL(event.target.files[0]);
}

window.saveData = async function(){
    let uname = document.getElementById("username").value;
    let dname = document.getElementById("display").value;

    await setDoc(doc(db,"users",user),{
        username: uname,
        display: dname,
        pic: imageBase64 || null
    },{merge:true});

    document.getElementById("msg").innerText = "PROFILE SAVED SUCCESSFULLY ✅";
}
</script>

</body>
</html>
