<!DOCTYPE html>
<html>
<head>
    <title>DASHBOARD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:white;
            text-align:center;
        }

        .top{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 20px;
        }

        .profile{
            display:flex;
            align-items:center;
            gap:10px;
            cursor:pointer;
        }

        .profile img{
            width:50px;
            height:50px;
            border-radius:50%;
            object-fit:cover;
        }

        .btn-grid{
            margin-top:70px;
            display:grid;
            grid-template-columns: repeat(2, 220px);
            gap:25px 40px;
            justify-content:center;
        }

        .btn{
            padding:18px 0;
            font-size:18px;
            font-weight:bold;
            border-radius:10px;
            text-decoration:none;
            color:white;
        }

        .send{ background:#e53935; }
        .receive{ background:#00acc1; }
        .friends{ background:#8b5cf6; }
        .vote{ background:#f59e0b; }
    </style>
</head>

<body>

<div class="top">
    <div class="profile" onclick="goProfile()">
        <img id="dp">
        <div id="uname"></div>
    </div>

    <div onclick="logout()" style="cursor:pointer;">LOGOUT</div>
</div>

<h1>WELCOME</h1>

<div class="btn-grid">
    <a href="send.html" class="btn send">SEND NOTES</a>
    <a href="receive.html" class="btn receive">RECEIVE NOTES</a>
    <a href="friends.html" class="btn friends">FRIENDS</a>
    <a href="vote.html" class="btn vote">VOTE</a>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_0wFUxxNk3Dc8s3jYuUq85kEwYqoFLGw",
  authDomain: "school-project-7beb3.firebaseapp.com",
  databaseURL: "https://school-project-7beb3-default-rtdb.firebaseio.com/",
  projectId: "school-project-7beb3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let scs = localStorage.getItem("currentUser");

db.ref("users/"+scs).once("value", snap=>{
    let data = snap.val();
    document.getElementById("uname").innerText = data.username;

    if(data.pic){
        document.getElementById("dp").src = data.pic;
    }else{
        document.getElementById("dp").src = "https://i.imgur.com/3ZQ3Z4F.png";
    }
});

function goProfile(){
    window.location.href = "profile.html";
}

function logout(){
    localStorage.removeItem("currentUser");
    window.location.href = "index.html";
}
</script>

</body>
</html>
