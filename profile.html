<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;text-align:center;background:#f5f5f5;margin:0}
.circle{width:150px;height:150px;border-radius:50%;background:#333;margin:60px auto;overflow:hidden;position:relative;cursor:pointer}
.circle img{width:100%;height:100%;object-fit:cover;display:none}
.plus{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px;color:#fff}
input.edit{display:block;width:250px;margin:10px auto;padding:6px}
button{padding:8px 15px;background:green;color:#fff;border:none}
.box{background:#fff;display:inline-block;padding:20px;border-radius:10px}
</style>
</head>
<body>

<div class="circle" onclick="file.click()">
 <span class="plus" id="plus">+</span>
 <img id="img">
</div>
<input type="file" id="file" hidden onchange="load(event)">

<div class="box">
 <p>SCS: <span id="scs"></span></p>
 <input id="uname" class="edit" placeholder="Username">
 <input id="dname" class="edit" placeholder="Display Name">
 <button onclick="save()">Save</button>
</div>

<script>
let u=localStorage.getItem("currentUser");
if(!u)location.href="index.html";
scs.innerText=u;

function load(e){
 let r=new FileReader();
 r.onload=()=>{img.src=r.result;img.style.display="block";plus.style.display="none";localStorage.setItem(u+"_pic",r.result)};
 r.readAsDataURL(e.target.files[0]);
}
function save(){
 localStorage.setItem(u+"_username",uname.value);
 localStorage.setItem(u+"_display",dname.value);
 alert("Saved");
}
</script>

</body>
</html>
