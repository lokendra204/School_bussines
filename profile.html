<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_0wFUxxNk3Dc8s3jYuUq85kEwYqoFLGw",
  authDomain: "school-project-7beb3.firebaseapp.com",
  projectId: "school-project-7beb3",
  storageBucket: "school-project-7beb3.firebasestorage.app",
  messagingSenderId: "846563976783",
  appId: "1:846563976783:web:7dfdb561fa79b17cefec3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = localStorage.getItem("currentUser");
document.getElementById("scs").innerText = user;

let imageBase64 = "";

function chooseImage(){
    document.getElementById("fileInput").click();
}

window.chooseImage = chooseImage;

function loadImage(event){
    let reader = new FileReader();
    reader.onload = function(){
        imageBase64 = reader.result;
        let img = document.getElementById("preview");
        img.src = imageBase64;
        document.getElementById("plus").style.display="none";
    }
    reader.readAsDataURL(event.target.files[0]);
}

window.loadImage = loadImage;

window.onload = async function(){
    const snap = await getDoc(doc(db, "users", user));
    if(snap.exists()){
        let data = snap.data();

        document.getElementById("username").value = data.username || user;
        document.getElementById("display").value = data.display || data.username;

        if(data.pic){
            document.getElementById("preview").src = data.pic;
            document.getElementById("plus").style.display="none";
            imageBase64 = data.pic;
        }
    }
}

async function saveData(){
    let uname = document.getElementById("username").value;
    let dname = document.getElementById("display").value;

    await setDoc(doc(db, "users", user), {
        username: uname,
        display: dname,
        pic: imageBase64
    }, { merge:true });

    document.getElementById("msg").innerText = "PROFILE SAVED SUCCESSFULLY ✅";
}

window.saveData = saveData;
</script>
