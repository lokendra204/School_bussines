<!DOCTYPE html>
<html>
<head>
<title>ADD FRIEND</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#0f172a;color:white;text-align:center;font-family:Arial">

<h1>ADD FRIEND</h1>

<input id="fid" placeholder="Enter SCS NO">
<button onclick="add()">ADD</button>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_0wFUxxNk3Dc8s3jYuUq85kEwYqoFLGw",
  authDomain: "school-project-7beb3.firebaseapp.com",
  databaseURL: "https://school-project-7beb3-default-rtdb.firebaseio.com/",
  projectId: "school-project-7beb3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let scs = localStorage.getItem("currentUser");

function add(){
    let f=document.getElementById("fid").value;
    db.ref("friends/"+scs+"/"+f).set(true);
    alert("FRIEND ADDED");
}
</script>

</body>
</html>
