<!DOCTYPE html>
<html>
<head>
    <title>ADD FRIEND</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:white;
            text-align:center;
        }

        .top{
            padding:15px;
            font-size:20px;
            font-weight:bold;
            background:#1e293b;
            position:relative;
        }

        .back{
            position:absolute;
            left:15px;
            top:15px;
            cursor:pointer;
            font-size:14px;
        }

        .box{
            margin-top:80px;
        }

        input{
            width:250px;
            padding:12px;
            border:none;
            border-radius:6px;
            margin-bottom:15px;
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:6px;
            background:#22c55e;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        .msg{
            margin-top:15px;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="top">
    <div class="back" onclick="goBack()">← BACK</div>
    ADD FRIEND
</div>

<div class="box">
    <input type="text" id="friendSCS" placeholder="ENTER FRIEND SCS NO">
    <br>
    <button onclick="addFriend()">ADD FRIEND</button>
    <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_0wFUxxNk3Dc8s3jYuUq85kEwYqoFLGw",
  authDomain: "school-project-7beb3.firebaseapp.com",
  projectId: "school-project-7beb3",
  storageBucket: "school-project-7beb3.firebasestorage.app",
  messagingSenderId: "846563976783",
  appId: "1:846563976783:web:7dfdb561fa79b17cefec3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addFriend = async function(){

    let me = localStorage.getItem("currentUser");
    let friend = document.getElementById("friendSCS").value.trim();
    let msg = document.getElementById("msg");

    if(friend === ""){
        msg.innerText = "ENTER SCS NUMBER";
        msg.style.color = "red";
        return;
    }

    if(friend === me){
        msg.innerText = "YOU CANNOT ADD YOURSELF";
        msg.style.color = "red";
        return;
    }

    // ✅ Check user exists in Firestore
    const userRef = doc(db,"users",friend);
    const userSnap = await getDoc(userRef);

    if(!userSnap.exists()){
        msg.innerText = "USER DOES NOT EXIST";
        msg.style.color = "red";
        return;
    }

    // ✅ Save friend in Firestore (friends collection)
    await setDoc(doc(db,"friends", me+"_"+friend), {
        me: me,
        friend: friend
    });

    msg.innerText = "FRIEND ADDED SUCCESSFULLY ✅";
    msg.style.color = "lightgreen";
    document.getElementById("friendSCS").value="";
}

window.goBack = function(){
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
