<!DOCTYPE html>
<html>
<head>
    <title>ADD FRIEND</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#0f172a;
            color:white;
            text-align:center;
        }

        .top{
            padding:15px;
            font-size:20px;
            font-weight:bold;
            background:#1e293b;
            position:relative;
        }

        .back{
            position:absolute;
            left:15px;
            top:15px;
            cursor:pointer;
            font-size:14px;
        }

        .box{
            margin-top:80px;
        }

        input{
            width:250px;
            padding:12px;
            border:none;
            border-radius:6px;
            margin-bottom:15px;
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:6px;
            background:#22c55e;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        .msg{
            margin-top:15px;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="top">
    <div class="back" onclick="goBack()">← BACK</div>
    ADD FRIEND
</div>

<div class="box">
    <input type="text" id="friendSCS" placeholder="ENTER FRIEND SCS NO">
    <br>
    <button onclick="addFriend()">ADD FRIEND</button>
    <div class="msg" id="msg"></div>
</div>

<script>

function addFriend(){

    let me = localStorage.getItem("currentUser");
    let friend = document.getElementById("friendSCS").value.trim();
    let msg = document.getElementById("msg");

    if(friend === ""){
        msg.innerText = "ENTER SCS NUMBER";
        msg.style.color = "red";
        return;
    }

    if(friend === me){
        msg.innerText = "YOU CANNOT ADD YOURSELF";
        msg.style.color = "red";
        return;
    }

    // check if that user exists (means login once)
    if(!localStorage.getItem(friend+"_username") && 
       !localStorage.getItem(friend+"_display")){
        msg.innerText = "USER DOES NOT EXIST";
        msg.style.color = "red";
        return;
    }

    let friends = JSON.parse(localStorage.getItem(me+"_friends")) || [];

    if(friends.includes(friend)){
        msg.innerText = "ALREADY FRIEND";
        msg.style.color = "orange";
        return;
    }

    friends.push(friend);
    localStorage.setItem(me+"_friends", JSON.stringify(friends));

    msg.innerText = "FRIEND ADDED SUCCESSFULLY ✅";
    msg.style.color = "lightgreen";

    document.getElementById("friendSCS").value="";
}

function goBack(){
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
